<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClothingShop - Đăng Ký Tài Khoản</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        indigo: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans flex flex-col min-h-screen">

    <main class="flex-1 py-16 max-w-md mx-auto px-4 w-full flex items-center justify-center">
        <div class="bg-white border border-gray-150 rounded-3xl p-6 sm:p-10 shadow-xl w-full space-y-6">
            <div class="text-center space-y-2">
                <h1 class="text-2xl font-black text-gray-900 tracking-tight">Tạo Tài Khoản Mới</h1>
                <p class="text-xs text-gray-400">Tham gia hệ thống của chúng tôi để mua sắm dễ dàng hơn</p>
            </div>

            <div id="alert-box" class="hidden p-4 rounded-xl text-xs font-semibold"></div>

            <!-- Register Form -->
            <form onsubmit="handleRegisterSubmit(event)" class="space-y-4">
                <div>
                    <label class="block text-xxs font-bold text-gray-500 uppercase tracking-wider mb-2">Họ và tên của bạn:</label>
                    <input type="text" id="reg-name" placeholder="Nguyễn Văn A" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-50/50" required>
                </div>
                <div>
                    <label class="block text-xxs font-bold text-gray-500 uppercase tracking-wider mb-2">Địa chỉ Email:</label>
                    <input type="email" id="reg-email" placeholder="example@email.com" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-50/50" required>
                </div>
                <div>
                    <label class="block text-xxs font-bold text-gray-500 uppercase tracking-wider mb-2">Mật khẩu (tối thiểu 6 ký tự):</label>
                    <input type="password" id="reg-password" placeholder="••••••" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-50/50" required>
                </div>
                <div>
                    <label class="block text-xxs font-bold text-gray-500 uppercase tracking-wider mb-2">Xác nhận mật khẩu:</label>
                    <input type="password" id="reg-confirm" placeholder="••••••" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-50/50" required>
                </div>
                
                <button type="submit" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-750 text-white rounded-full text-xs font-bold transition shadow-lg shadow-indigo-500/10">Đăng Ký Tài Khoản</button>
            </form>

            <p class="text-center text-xxs text-gray-400">
                Đã có tài khoản? <a href="login.html" class="text-indigo-650 font-bold hover:underline">Đăng nhập tại đây</a>
            </p>
        </div>
    </main>

    <!-- JS scripts -->
    <script src="js/app.js"></script>
    <script>
        async function handleRegisterSubmit(event) {
            event.preventDefault();
            const fullName = document.getElementById("reg-name").value.trim();
            const email = document.getElementById("reg-email").value.trim();
            const password = document.getElementById("reg-password").value.trim();
            const confirmPassword = document.getElementById("reg-confirm").value.trim();

            const box = document.getElementById("alert-box");
            box.classList.add("hidden");

            if (password !== confirmPassword) {
                box.className = "p-4 rounded-xl text-xs font-semibold bg-rose-100 text-rose-700 block";
                box.innerText = "Mật khẩu xác nhận không khớp.";
                return;
            }

            // Migrate guest cart items on register
            const guestCart = getLocalCart().map(i => ({ productVariantId: i.productVariantId, quantity: i.quantity }));

            try {
                const res = await apiFetch("AuthApi/register", {
                    method: "POST",
                    body: { fullName, email, password, confirmPassword, cartItems: guestCart }
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem("user", JSON.stringify(data.user));
                    // Clear local cart since it migrated
                    localStorage.removeItem("GuestCart");

                    box.className = "p-4 rounded-xl text-xs font-semibold bg-green-100 text-green-700 block";
                    box.innerText = "Đăng ký tài khoản thành công! Đang chuyển hướng...";
                    setTimeout(() => {
                        window.location.href = "profile.html";
                    }, 1000);
                } else {
                    box.className = "p-4 rounded-xl text-xs font-semibold bg-rose-100 text-rose-700 block";
                    box.innerText = data.message || "Không thể tạo tài khoản. Vui lòng kiểm tra lại.";
                }
            } catch (e) {
                console.error("Register submission error:", e);
            }
        }
    </script>
</body>
</html>
