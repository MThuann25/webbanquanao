<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClothingShop - Giỏ Hàng</title>
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Times New Roman', 'Times', 'serif'],
                    },
                    colors: {
                        indigo: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans flex flex-col min-h-screen">

    <main class="flex-1 py-12 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
        <h1 class="text-3xl font-black text-gray-900 tracking-tight mb-8">Giỏ Hàng Của Bạn</h1>
        
        <div id="alert-box" class="hidden mb-6 p-4 rounded-xl text-xs font-semibold"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Items Grid -->
            <div class="lg:col-span-2 space-y-4">
                <div id="cart-items-container" class="space-y-4">
                    <!-- Loaded dynamically -->
                    <div class="bg-white border border-gray-100 rounded-2xl p-8 text-center text-gray-400">
                        <i class="fa-solid fa-spinner animate-spin text-2xl mb-2"></i>
                        <p class="text-xs">Đang tải giỏ hàng...</p>
                    </div>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="bg-white border border-gray-150 rounded-3xl p-6 shadow-sm self-start space-y-6">
                <h3 class="font-bold text-xs uppercase text-gray-400 tracking-wider">Tóm tắt đơn hàng</h3>
                
                <div class="divide-y divide-gray-100 text-xs">
                    <div class="flex justify-between py-3">
                        <span class="text-gray-500">Tạm tính</span>
                        <span id="summary-subtotal" class="font-bold text-gray-800">0đ</span>
                    </div>
                    <div class="flex justify-between py-3">
                        <span class="text-gray-500">Phí vận chuyển</span>
                        <span class="font-bold text-gray-800 text-green-600">Miễn phí</span>
                    </div>
                    <div class="flex justify-between py-4 text-sm font-black">
                        <span class="text-gray-900">Tổng cộng</span>
                        <span id="summary-total" class="text-indigo-600">0đ</span>
                    </div>
                </div>

                <a href="checkout.html" id="checkout-btn" class="block w-full text-center py-3.5 bg-indigo-600 hover:bg-indigo-750 text-white rounded-full text-xs font-bold transition shadow-lg shadow-indigo-500/10">Thực Hiện Thanh Toán</a>
                <a href="shop.html" class="block w-full text-center py-2 text-indigo-600 hover:underline text-xs font-semibold transition">Tiếp tục mua sắm</a>
            </div>
        </div>
    </main>

    <!-- JS script calls -->
    <script src="js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            // Kiểm tra đăng nhập - bắt buộc phải đăng nhập để xem giỏ hàng
            const user = getCurrentUser();
            if (!user) {
                window.location.href = "login.html?returnUrl=cart.html";
                return;
            }
            await loadCartData();
        });

        async function loadCartData() {
            const container = document.getElementById("cart-items-container");
            const items = await getCartItems();

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="bg-white border border-dashed border-gray-200 rounded-3xl p-12 text-center space-y-4">
                        <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto text-gray-400">
                            <i class="fa-solid fa-basket-shopping text-2xl"></i>
                        </div>
                        <h3 class="font-bold text-sm text-gray-700">Giỏ hàng của bạn đang trống</h3>
                        <p class="text-xs text-gray-400 max-w-xs mx-auto">Vui lòng ghé thăm cửa hàng của chúng tôi để chọn lựa những bộ đồ thời trang ưng ý nhất.</p>
                        <a href="shop.html" class="inline-block px-6 py-2.5 bg-indigo-600 hover:bg-indigo-750 text-white rounded-full text-xs font-bold transition shadow-md">Đến Cửa Hàng</a>
                    </div>
                `;
                document.getElementById("summary-subtotal").innerText = "0đ";
                document.getElementById("summary-total").innerText = "0đ";
                document.getElementById("checkout-btn").classList.add("pointer-events-none", "opacity-50");
                return;
            }

            document.getElementById("checkout-btn").classList.remove("pointer-events-none", "opacity-50");
            container.innerHTML = "";
            let subtotal = 0;

            items.forEach(item => {
                subtotal += item.totalPrice;
                const card = document.createElement("div");
                card.className = "bg-white border border-gray-100 rounded-3xl p-5 shadow-sm flex flex-col sm:flex-row gap-4 items-center justify-between";
                card.innerHTML = `
                    <div class="flex items-center space-x-4 w-full sm:w-auto">
                        <img src="${item.imageUrl}" alt="${item.productName}" class="w-16 h-20 object-cover rounded-xl border border-gray-100">
                        <div>
                            <h3 class="font-bold text-xs text-gray-800 line-clamp-1">${item.productName}</h3>
                            <p class="text-[10px] text-gray-400 mt-1">Phân loại: Size ${item.size} / Màu ${item.color}</p>
                            <span class="text-xs font-black text-indigo-600 mt-2 block">${item.price.toLocaleString("vi-VN")}đ</span>
                        </div>
                    </div>
                    <div class="flex items-center space-x-6 w-full sm:w-auto justify-between sm:justify-end mt-4 sm:mt-0">
                        <div class="flex items-center border border-gray-200 rounded-xl overflow-hidden bg-gray-50">
                            <button onclick="changeQty(${item.id}, ${item.productVariantId}, ${item.quantity - 1})" class="px-2 py-1.5 hover:bg-gray-100 transition text-xs"><i class="fa-solid fa-minus"></i></button>
                            <span class="px-3 py-1.5 text-xs font-bold w-10 text-center bg-white">${item.quantity}</span>
                            <button onclick="changeQty(${item.id}, ${item.productVariantId}, ${item.quantity + 1})" class="px-2 py-1.5 hover:bg-gray-100 transition text-xs"><i class="fa-solid fa-plus"></i></button>
                        </div>
                        <button onclick="removeItem(${item.id}, ${item.productVariantId})" class="text-gray-400 hover:text-rose-600 transition text-sm p-2"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                `;
                container.appendChild(card);
            });

            document.getElementById("summary-subtotal").innerText = subtotal.toLocaleString("vi-VN") + "đ";
            document.getElementById("summary-total").innerText = subtotal.toLocaleString("vi-VN") + "đ";
        }

        async function changeQty(itemId, variantId, qty) {
            if (qty <= 0) return;
            const res = await updateCartQuantity(itemId, variantId, qty);
            if (!res.success) {
                const box = document.getElementById("alert-box");
                box.classList.remove("hidden", "bg-green-100", "text-green-700");
                box.classList.add("bg-rose-100", "text-rose-700");
                box.innerText = res.message;
                box.style.display = "block";
            } else {
                document.getElementById("alert-box").classList.add("hidden");
                await loadCartData();
                updateCartCountBadge();
            }
        }

        async function removeItem(itemId, variantId) {
            const res = await removeCartItem(itemId, variantId);
            if (res.success) {
                await loadCartData();
                updateCartCountBadge();
            }
        }
    </script>
</body>
</html>
