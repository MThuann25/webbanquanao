<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMTShop - Đăng Nhập</title>
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Times New Roman', 'Times', 'serif'],
                    },
                    colors: {
                        indigo: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans flex flex-col min-h-screen">

    <main class="flex-1 py-16 max-w-md mx-auto px-4 w-full flex items-center justify-center">
        <div class="bg-white border border-gray-150 rounded-3xl p-6 sm:p-10 shadow-xl w-full space-y-6">
            <div class="text-center space-y-2">
                <h1 class="text-2xl font-black text-gray-900 tracking-tight">Chào Mừng Trở Lại</h1>
                <p class="text-xs text-gray-400">Đăng nhập tài khoản của bạn để tiếp tục mua sắm</p>
            </div>

            <div id="alert-box" class="hidden p-4 rounded-xl text-xs font-semibold"></div>

            <!-- Credentials Form -->
            <form onsubmit="handleLoginSubmit(event)" class="space-y-4">
                <div>
                    <label class="block text-xxs font-bold text-gray-500 uppercase tracking-wider mb-2">Địa chỉ Email:</label>
                    <input type="email" id="login-email" placeholder="example@email.com" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-50/50" required>
                </div>
                <div>
                    <div class="flex justify-between mb-2">
                        <label class="block text-xxs font-bold text-gray-500 uppercase tracking-wider">Mật khẩu:</label>
                        <a href="#" class="text-xxs text-indigo-650 font-bold hover:underline">Quên mật khẩu?</a>
                    </div>
                    <input type="password" id="login-password" placeholder="••••••" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-50/50" required>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="login-remember" class="h-4 w-4 text-indigo-650 focus:ring-indigo-500 border-gray-300 rounded">
                    <label for="login-remember" class="ml-2 text-xxs font-semibold text-gray-500 select-none">Nhớ mật khẩu của tôi</label>
                </div>
                <button type="submit" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-750 text-white rounded-full text-xs font-bold transition shadow-lg shadow-indigo-500/10">Đăng Nhập</button>
            </form>

            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-gray-150"></div>
                <span class="flex-shrink mx-4 text-xxs uppercase text-gray-400 font-bold tracking-wider">Hoặc đăng nhập bằng</span>
                <div class="flex-grow border-t border-gray-150"></div>
            </div>

            <!-- Google Signin -->
            <button onclick="triggerGoogleLogin()" class="w-full py-3 border border-gray-200 hover:bg-gray-50 text-gray-600 rounded-full text-xs font-bold transition flex items-center justify-center space-x-2">
                <i class="fa-brands fa-google text-rose-500 text-sm"></i>
                <span>Kết nối bằng tài khoản Google</span>
            </button>

            <p class="text-center text-xxs text-gray-400">
                Chưa có tài khoản? <a href="register.html" class="text-indigo-650 font-bold hover:underline">Đăng ký ngay</a>
            </p>
        </div>
    </main>

    <!-- JS scripts -->
    <script src="js/app.js"></script>
    <script>
        let returnUrl = "profile.html";

        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            if (params.has("returnUrl")) returnUrl = params.get("returnUrl");
            if (params.has("error")) {
                const box = document.getElementById("alert-box");
                box.className = "p-4 rounded-xl text-xs font-semibold bg-rose-100 text-rose-700 block";
                box.innerText = params.get("error");
            }
        });

        async function handleLoginSubmit(event) {
            event.preventDefault();
            const email = document.getElementById("login-email").value.trim();
            const password = document.getElementById("login-password").value.trim();
            const rememberMe = document.getElementById("login-remember").checked;

            const box = document.getElementById("alert-box");
            box.classList.add("hidden");

            try {
                const res = await apiFetch("AuthApi/login", {
                    method: "POST",
                    body: { email, password, rememberMe }
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem("user", JSON.stringify(data.user));
                    box.className = "p-4 rounded-xl text-xs font-semibold bg-green-100 text-green-700 block";
                    box.innerText = "Đăng nhập thành công! Đang chuyển hướng...";
                    setTimeout(() => {
                        window.location.href = returnUrl;
                    }, 800);
                } else {
                    box.className = "p-4 rounded-xl text-xs font-semibold bg-rose-100 text-rose-700 block";
                    box.innerText = data.message || "Tài khoản hoặc mật khẩu không hợp lệ.";
                }
            } catch (e) {
                console.error("Login submission error:", e);
            }
        }

        function triggerGoogleLogin() {
            // Point OAuth redirect to Backend AuthApi controller challenge
            window.location.href = `${API_BASE_URL}/api/AuthApi/externallogin?provider=Google&returnUrl=${window.location.origin}/profile.html`;
        }
    </script>
</body>
</html>
